# Development environment values
# Extends base values.yaml with dev-specific overrides

replicaCount: 1

image:
  tag: "latest"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Enable ingress for dev with basic configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"

  hosts:
    - host: assesment-dev.thangeshbabu.xyz
      paths:
        - path: /
          pathType: Prefix

  tls:
    - secretName: petclinic-dev-tls
      hosts:
        - assesment-dev.thangeshbabu.xyz

# Relax security for dev debugging
podSecurityContext:
  fsGroup: 1001
  runAsNonRoot: true
  runAsUser: 1001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1001

# Dev-specific environment variables
env:
  - name: SPRING_PROFILES_ACTIVE
    value: "postgres"
  - name: SERVER_PORT
    value: "8080"
  - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
    value: "health,info,metrics,env,configprops"
  - name: LOGGING_LEVEL_ROOT
    value: "INFO"
  - name: SPRING_JPA_DATABASE_PLATFORM
    value: "org.hibernate.dialect.PostgreSQLDialect"
  - name: SPRING_JPA_HIBERNATE_DDL_AUTO
    value: "validate"

# No PDB for dev (single replica)
podDisruptionBudget:
  enabled: false

# Disable autoscaling for dev
autoscaling:
  enabled: false

networkPolicy:
  enabled: true
  ingressControllerNamespace: "ingress-nginx"
  cilium:
    enabled: false

database:
  enabled: true
  type: postgresql
  host: postgres
  port: 5432
  secretName: postgres-secret
