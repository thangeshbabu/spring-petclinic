name: CI/CD — Build, Scan, Push & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy-prod
          - rollback-dev
          - rollback-prod
      image_tag:
        description: 'Image tag for prod deploy (short SHA, e.g. abc1234). Required for deploy-prod.'
        required: false
        default: ''
      revision:
        description: 'Helm revision to roll back to (leave blank for previous revision)'
        required: false
        default: ''

env:
  IMAGE_NAME: spring-petclinic
  HELM_CHART: helm/petclinic
  HELM_RELEASE: petclinic
  DEV_NAMESPACE: petclinic-dev
  PROD_NAMESPACE: petclinic-prod

permissions:
  id-token: write
  contents: read

jobs:

  build-scan-push:
    name: Build → Scan → Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    outputs:
      image_tag:  ${{ steps.tag.outputs.short_sha }}
      image_full: ${{ steps.tag.outputs.image_full }}

    steps:
      - uses: actions/checkout@v6
        name: Checkout
        with: 
          token: ${{ secrets. GITHUB_TOKEN }}

      - name: Compute image tag (short SHA)
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          # echo "image_full=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_full=${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # - name: Azure login (OIDC — no stored secrets)
      #   uses: azure/login@v2
      #   with:
      #     client-id:       ${{ secrets.AZURE_CLIENT_ID }}
      #     tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
      #     subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      #
      # - name: Log in to ACR
      #   run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dockerfile
          push: false
          load: true
          tags: ${{ steps.tag.outputs.image_full }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref:      ${{ steps.tag.outputs.image_full }}
          format:         table
          severity:       CRITICAL,HIGH
          ignore-unfixed: true
          exit-code:      '0'

