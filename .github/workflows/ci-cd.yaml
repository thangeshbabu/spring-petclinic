name: CI/CD — Build, Scan, Push & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: spring-petclinic
  HELM_CHART: helm/petclinic
  HELM_RELEASE: petclinic
  DEV_NAMESPACE: petclinic-dev
  PROD_NAMESPACE: petclinic-prod

permissions:
  id-token: write
  contents: read

jobs:

  build-scan-push:
    name: Build → Scan → Push
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.short_sha }}
      image_full: ${{ steps.tag.outputs.image_full }}

    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag (short SHA)
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_full=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dockerfile
          push: false
          load: true
          tags: ${{ steps.tag.outputs.image_full }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref:      ${{ steps.tag.outputs.image_full }}
          format:         table
          severity:       CRITICAL,HIGH
          ignore-unfixed: true
          exit-code:      '1'
          skip-files: "/app/app.jar"

      - name: Push to ACR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ steps.tag.outputs.image_full }}
          docker tag ${{ steps.tag.outputs.image_full }} \
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest


  deploy-dev:
    name: Deploy → Dev
    runs-on: ubuntu-latest
    needs: build-scan-push
    environment: dev
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing --admin

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.DEV_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy (Dev)
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART }} \
            --namespace ${{ env.DEV_NAMESPACE }} \
            --values ${{ env.HELM_CHART }}/values-dev.yaml \
            --set image.repository=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.build-scan-push.outputs.image_tag }} \
            --atomic --wait --timeout 5m


  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest

    needs: [build-scan-push, deploy-dev]
    environment: prod   # <-- THIS enables approval gate in GitHub UI

    if: success()

    steps:
      - uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing --admin

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.PROD_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy (Prod)
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART }} \
            --namespace ${{ env.PROD_NAMESPACE }} \
            --values ${{ env.HELM_CHART }}/values.yaml \
            --values ${{ env.HELM_CHART }}/values-prod.yaml \
            --set image.repository=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.build-scan-push.outputs.image_tag }} \
            --atomic --wait --timeout 10m
